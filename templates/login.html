{% extends "base.html" %}
{% block title %}Авторизация — ООО «Обувь»{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">

        <img src="{{ url_for('static', filename='images/icon.ico') }}"
             alt="Логотип" class="login-logo mb-3">

        <h4 class="mb-4">Вход в систему</h4>

        <form method="POST">
          <div class="mb-3 text-start">
            <label class="form-label">Логин</label>
            <input type="text" name="login" class="form-control" required autofocus>
          </div>
          <div class="mb-3 text-start">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-accent w-100 mb-2">
            <i class="bi bi-box-arrow-in-right"></i> Войти
          </button>
        </form>

        <form method="POST">
          <button type="submit" name="guest" value="1"
                  class="btn btn-secondary-brand w-100">
            <i class="bi bi-eye"></i> Войти как гость
          </button>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock %}
